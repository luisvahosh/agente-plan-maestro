<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#00AEEF">
    <title>Asistente Virtual · Plan Maestro Medellín Distrito Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --cyan: #00AEEF;          /* Pantone 306 C - acento institucional */
            --cyan-dark: #0089BD;
            --cyan-soft: #E7F7FD;
            --ink: #1F2A33;
            --muted: #6B7280;
            --line: #E5E8EB;
            --bg: #EDF1F4;
            --user: #00AEEF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            color: var(--ink);
        }

        .container {
            width: 100%;
            max-width: 880px;
            height: 92vh;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ---------- Encabezado institucional ---------- */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            background: #fff;
            border-bottom: 3px solid var(--cyan);
        }
        .header img.logo { height: 46px; width: auto; flex-shrink: 0; }
        .header .titles { flex: 1; min-width: 0; }
        .header .titles h1 {
            font-size: 16px;
            line-height: 1.2;
            color: var(--ink);
        }
        .header .titles p {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }
        .header .actions { display: flex; gap: 8px; flex-shrink: 0; }
        .icon-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--cyan-dark);
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            transition: background .15s, border-color .15s;
        }
        .icon-btn:hover { background: var(--cyan-soft); border-color: var(--cyan); }

        /* ---------- Área de chat ---------- */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: linear-gradient(180deg, #F7FAFC 0%, #fff 60px);
        }

        .message { display: flex; flex-direction: column; }
        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }

        .message-content {
            max-width: 80%;
            padding: 12px 15px;
            border-radius: 14px;
            font-size: 15px;
            line-height: 1.55;
            word-wrap: break-word;
            overflow-wrap: anywhere;
        }
        .message.user .message-content {
            background: var(--user);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-content {
            background: #fff;
            color: var(--ink);
            border: 1px solid var(--line);
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .message-content p { margin: 0 0 8px; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content ul, .message-content ol { margin: 6px 0 8px 20px; }
        .message-content li { margin-bottom: 4px; }
        .message-content strong { color: var(--cyan-dark); }
        .message.user .message-content strong { color: #fff; }
        .message-content a { color: var(--cyan-dark); }

        /* ---------- Membrete de fuentes (cita) ---------- */
        .sources {
            max-width: 80%;
            margin-top: 8px;
            background: #F4FAFD;
            border: 1px solid var(--line);
            border-left: 4px solid var(--cyan);
            border-radius: 10px;
            padding: 10px 12px;
        }
        .sources-title {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: .04em;
            text-transform: uppercase;
            color: var(--cyan-dark);
            margin-bottom: 8px;
        }
        .chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .chip {
            display: inline-block;
            max-width: 100%;
            background: #fff;
            border: 1px solid var(--line);
            color: #374151;
            font-size: 12px;
            line-height: 1.3;
            padding: 5px 10px;
            border-radius: 12px;
            overflow-wrap: anywhere;
        }
        .chip-verified {
            background: var(--cyan);
            border-color: var(--cyan);
            color: #fff;
            font-weight: bold;
        }

        /* ---------- Indicador de escritura ---------- */
        .typing-indicator { display: flex; gap: 5px; padding: 4px 2px; }
        .typing-indicator span {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--cyan); opacity: .6;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: .2s; }
        .typing-indicator span:nth-child(3) { animation-delay: .4s; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

        /* ---------- Entrada ---------- */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 12px 14px;
            background: #fff;
            border-top: 1px solid var(--line);
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        .input-area input {
            flex: 1;
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 13px 16px;
            font-size: 16px;            /* 16px evita el zoom automático en iOS */
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }
        .input-area input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0,174,239,.15);
        }
        .input-area button {
            background: var(--cyan);
            color: #fff;
            border: none;
            border-radius: 24px;
            padding: 0 22px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background .15s;
        }
        .input-area button:hover { background: var(--cyan-dark); }
        .input-area button:disabled { opacity: .5; cursor: not-allowed; }

        /* ---------- Móvil ---------- */
        @media (max-width: 760px) {
            body { padding: 0; align-items: stretch; }
            .container {
                height: 100vh;
                height: 100dvh;
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
            }
            .header img.logo { height: 38px; }
            .header .titles h1 { font-size: 14px; }
            .header .titles p { font-size: 11px; }
            .message-content { max-width: 90%; font-size: 15px; }
            .sources { max-width: 92%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/static/logo-alcaldia.png" alt="Alcaldía de Medellín - Distrito de Ciencia, Tecnología e Innovación" class="logo">
            <div class="titles">
                <h1>Asistente Virtual del PMDI</h1>
                <p>Plan Maestro Medellín · Distrito Inteligente</p>
            </div>
            <div class="actions">
                <button class="icon-btn" id="newChatBtn" onclick="newConversation()" title="Nueva conversación" aria-label="Nueva conversación">＋</button>
                <a class="icon-btn" href="/admin" title="Panel administrativo" aria-label="Panel administrativo">⚙</a>
            </div>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="input-area">
            <input type="text" id="questionInput" placeholder="Escribe tu pregunta sobre el PMDI…" autocomplete="off">
            <button id="sendBtn" onclick="sendQuestion()">Enviar</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');

        // ─── Memoria conversacional ───
        let conversationHistory = [];   // [{role, content}]

        const WELCOME_HTML =
            '<strong>Hola 👋</strong><br>' +
            'Soy el Asistente Virtual del Plan Maestro Medellín Distrito Inteligente (PMDI). ' +
            'Puedo orientarte sobre los pilares, misiones, gobernanza y cómo articular tu proyecto con el plan.<br><br>' +
            '<em>¿En qué puedo ayudarte?</em>';

        let _memId = null;  // respaldo en memoria si localStorage no está disponible

        function makeId() {
            try {
                if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
            } catch (e) {}
            return 'conv-' + Date.now() + '-' + Math.random().toString(16).slice(2);
        }

        function getConversationId() {
            try {
                let id = localStorage.getItem('pmdi_conversation_id');
                if (!id) {
                    id = makeId();
                    localStorage.setItem('pmdi_conversation_id', id);
                }
                return id;
            } catch (e) {
                if (!_memId) _memId = makeId();
                return _memId;
            }
        }

        function showWelcome() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.innerHTML = '<div class="message-content">' + WELCOME_HTML + '</div>';
            chatArea.appendChild(div);
        }

        async function loadConversation() {
            const id = getConversationId();
            try {
                const res = await fetch('/conversation/' + id);
                const data = await res.json();
                const messages = (data && data.messages) || [];
                if (messages.length === 0) { showWelcome(); return; }
                messages.forEach(m => {
                    const sources = Array.isArray(m.sources) ? m.sources : [];
                    addMessage(m.content, m.role === 'user', sources);
                    conversationHistory.push({ role: m.role, content: m.content });
                });
            } catch (e) {
                showWelcome();
            }
        }

        function newConversation() {
            try { localStorage.removeItem('pmdi_conversation_id'); } catch (e) {}
            _memId = null;
            getConversationId();
            conversationHistory = [];
            chatArea.innerHTML = '';
            showWelcome();
            questionInput.focus();
        }

        // Quita las citas "(Fuente: ...)" del texto; la cita se muestra como membrete aparte
        function stripInlineCites(t) {
            return (t || '').replace(/\s*\((?:Fuente|Fuentes)\s*:[^)]*\)/gi, '').trim();
        }

        // Nombre de fuente legible para el chip
        function cleanSource(s) {
            if (!s) return '';
            if (s.indexOf('Banco Q&A') === 0) return '✓ Respuesta verificada';
            if (s.indexOf('Casos de articul') === 0) return '✓ Caso verificado';
            // normalize('NFC') compone acentos por si llega algún nombre descompuesto
            return s.normalize('NFC').replace(/\.pdf$/i, '').replace(/\s+/g, ' ').trim();
        }
        function isVerified(s) {
            return s.indexOf('Banco Q&A') === 0 || s.indexOf('Casos de articul') === 0;
        }

        function addMessage(content, isUser = false, sources = []) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            if (isUser) {
                contentDiv.textContent = content;
            } else {
                contentDiv.innerHTML = marked.parse(stripInlineCites(content));
            }
            messageDiv.appendChild(contentDiv);

            if (!isUser && sources && sources.length > 0) {
                const box = document.createElement('div');
                box.className = 'sources';
                const label = document.createElement('div');
                label.className = 'sources-title';
                label.textContent = '📑 Fuentes consultadas';
                box.appendChild(label);

                const chips = document.createElement('div');
                chips.className = 'chips';
                sources.forEach(s => {
                    const chip = document.createElement('span');
                    chip.className = 'chip' + (isVerified(s) ? ' chip-verified' : '');
                    chip.textContent = cleanSource(s);
                    chips.appendChild(chip);
                });
                box.appendChild(chips);
                messageDiv.appendChild(box);
            }

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return messageDiv;
        }

        async function sendQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;

            addMessage(question, true);
            conversationHistory.push({ role: 'user', content: question });
            questionInput.value = '';

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            questionInput.disabled = true;
            sendBtn.disabled = true;

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        top_k: 5,
                        conversation_id: getConversationId(),
                        history: conversationHistory.slice(0, -1).slice(-6)
                    })
                });
                if (!response.ok) throw new Error(`Error: ${response.statusText}`);
                const data = await response.json();

                const typingEl = document.getElementById('typingIndicator');
                if (typingEl) typingEl.remove();

                if (data.success) {
                    addMessage(data.answer, false, data.sources);
                    conversationHistory.push({ role: 'assistant', content: data.answer });
                } else {
                    addMessage(data.error || 'Ocurrió un error', false);
                }
            } catch (error) {
                const typingEl = document.getElementById('typingIndicator');
                if (typingEl) typingEl.remove();
                addMessage(`Error: ${error.message}`, false);
            } finally {
                questionInput.disabled = false;
                sendBtn.disabled = false;
                questionInput.focus();
            }
        }

        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
        });

        loadConversation();
        questionInput.focus();
    </script>
</body>
</html>

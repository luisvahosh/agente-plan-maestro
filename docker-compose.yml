name: agente-plan-maestro

services:
  api:
    build: .
    container_name: agente-plan-maestro
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      # host:contenedor — puerto 8080 en el host (libre; NO toca el 80/443 de Nginx Proxy Manager)
      - "8080:8000"

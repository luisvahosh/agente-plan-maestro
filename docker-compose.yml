services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

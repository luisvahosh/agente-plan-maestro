name: agente-plan-maestro

services:
  api:
    build: .
    container_name: agente-plan-maestro
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      # Acceso directo opcional por IP:7070 (para pruebas). NPM enruta por la red interna.
      - "7070:8000"
    networks:
      - red-web

networks:
  # Red existente de Nginx Proxy Manager. Nos conectamos a ella SIN modificarla.
  red-web:
    external: true
    name: red-de-sitios_red-web
